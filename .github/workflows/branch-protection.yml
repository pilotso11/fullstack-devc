name: Configure Branch Protection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/branch-protection.yml'

jobs:
  configure:
    runs-on: ubuntu-latest
    permissions:
      administration: write
    steps:
      - name: Set up branch protection for main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Enable branch protection on main.
          # enforce_admins=false allows repository owners/admins to force push and merge directly.
          gh api \
            --method PUT \
            "repos/$REPO/branches/main/protection" \
            --input - << 'EOF'
          {
            "required_status_checks": null,
            "enforce_admins": false,
            "required_pull_request_reviews": null,
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": false,
            "lock_branch": false
          }
          EOF

          # Require signed commits on main.
          gh api \
            --method POST \
            "repos/$REPO/branches/main/protection/required_signatures"
